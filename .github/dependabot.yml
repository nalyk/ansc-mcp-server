version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Chisinau
    open-pull-requests-limit: 5
    groups:
      runtime:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev:
        dependency-type: development
        update-types:
          - patch
          - minor
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Chisinau
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
