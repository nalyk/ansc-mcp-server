name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Sigstore provenance requires `id-token: write`. `contents: write` lets us
# create the matching GitHub Release in the same job.
permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/mcp-ansc-server
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # let `gh release create --generate-notes` see history

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' (=$TAG) does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Tag and package version both = $PKG"

      - name: Type-check
        run: npm run lint

      - name: Test
        run: npm test -- --ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release (if missing)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — leaving it alone."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          fi
