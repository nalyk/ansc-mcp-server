name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test -- --ci
      - name: Audit (high+ only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mcp-ansc-server:ci
      - name: Smoke-run image (stdio handshake)
        run: |
          # Pipe an `initialize` JSON-RPC request and confirm the server replies on stdout.
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'
          OUT=$(printf '%s\n' "$INIT" | docker run -i --rm mcp-ansc-server:ci 2>/dev/null | head -1)
          echo "$OUT"
          echo "$OUT" | grep -q '"protocolVersion"' || { echo "stdio handshake failed"; exit 1; }
